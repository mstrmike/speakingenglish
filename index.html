<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тренажёр устной части ОГЭ/ЕГЭ</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; }
    h1, h2 { text-align: center; }
    #timer { font-size: 3rem; color: darkred; margin: 10px 0; text-align: center; }
    button { padding: 8px 16px; margin: 5px; }
    #task { margin: 15px 0; font-size: 1.2rem; border: 1px solid #ccc; padding: 10px; min-height: 60px; white-space: pre-wrap; }
    .hidden { display: none; }
    .center { text-align: center; }
    label { display: inline-block; margin: 5px 0; }
    input[type="text"] { padding: 4px 8px; width: 220px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
</head>
<body>
  <!-- ЭКРАН СТАРТА -->
  <div id="screen-start">
    <h1>Тренажёр устной части</h1>

    <div class="center">
      <label>
        Фамилия:
        <input type="text" id="lastName" placeholder="Иванов">
      </label>
    </div>
    <div class="center">
      <label>
        Имя:
        <input type="text" id="firstName" placeholder="Иван">
      </label>
    </div>
    <div class="center">
      <label>
        Класс:
        <input type="text" id="className" placeholder="9А">
      </label>
    </div>

    <div class="center" style="margin-top:10px;">
      <label>
        Экзамен:
        <select id="examSelect">
          <option value="oge">ОГЭ</option>
          <option value="ege">ЕГЭ</option>
        </select>
      </label>
    </div>

    <div class="center" style="margin-top:10px;">
      <label>
        Вариант:
        <select id="variantSelect"></select>
      </label>
    </div>

    <!-- Блок с кодом доступа к премиум-вариантам -->
    <div class="center" style="margin-top:20px;">
      <details>
        <summary>У меня есть код для премиум-доступа</summary>
        <div style="margin-top:10px;">
          <input type="text" id="premiumCodeInput" placeholder="Введите код доступа" style="width:220px; padding:4px 8px;">
          <button id="applyPremiumCodeBtn">Активировать</button>
        </div>
        <div id="premiumStatus" style="margin-top:5px; font-size:0.9rem; color:#555;"></div>
      </details>
    </div>

    <div class="center" style="margin-top:20px;">
      <button id="startExamBtn">Начать</button>
    </div>
  </div>

  <!-- ЭКРАН ЭКЗАМЕНА -->
  <div id="screen-exam" class="hidden">
    <h2 id="examTitle"></h2>
    <div id="phaseLabel" class="center"></div>

    <div id="task"></div>

    <div class="center">
      <audio id="questionPlayer" controls style="width:100%; display:none;"></audio>
      <audio id="beepPlayer" src="audio/beep.mp3" preload="auto" style="display:none;"></audio>
      <audio id="startSpeakingPlayer" src="audio/start_speaking.mp3" preload="auto" style="display:none;"></audio>
    </div>

    <div id="timer">00:00</div>

    <div class="center">
      <button id="actionBtn" disabled>...</button>
    </div>
  </div>

  <!-- ЭКРАН ФИНАЛА -->
  <div id="screen-final" class="hidden">
    <h2>Экзамен завершён</h2>

    <div class="center">
      <p>Сохраните и при необходимости прослушайте записи:</p>
      <div>
        <button id="playDownload1Btn" disabled>Задание 1</button>
      </div>
      <div>
        <button id="playDownload2Btn" disabled>Задание 2</button>
      </div>
      <div>
        <button id="playDownload3Btn" disabled>Задание 3</button>
      </div>
      <div>
        <button id="playDownload4Btn" disabled>Задание 4 (монолог)</button>
      </div>
    </div>

    <div class="center" style="margin-top:20px;">
      <audio id="finalPlayer" controls style="width:100%;"></audio>
    </div>

    <div class="center" style="margin-top:20px;">
      <button id="backBtn">Вернуться на старт</button>
    </div>
  </div>

  <script src="tasks.js"></script>
  <script src="script_oge.js"></script>
  <script src="script_ege.js"></script>
  <script src="script.js"></script>
</body>
</html>
